<svg
    width="256"
    height="192"
    viewBox="0 0 256 192"
    version="1.1"
    xmlns="http://www.w3.org/2000/svg">

  <!-- Rounded card box -->
  <rect
      x="20"
      y="20"
      width="216"
      height="152"
      rx="12"
      ry="12"
      style="fill:none;stroke:#3cb5d6;stroke-width:4;" />

  <!-- Radio outer circle -->
  <circle
      cx="50"
      cy="70"
      r="14"
      style="fill:none;stroke:#3cb5d6;stroke-width:4;" />

  <!-- Radio inner dot (checked state) -->
  <circle
      cx="50"
      cy="70"
      r="6"
      style="fill:#3cb5d6;stroke:none;" />

  <!-- Title text line -->
  <path
      d="M 80 70 H 200"
      style="fill:none;stroke:#3cb5d6;stroke-width:4;" />

  <!-- Description line 1 (aligned with title) -->
  <path
      d="M 80 110 H 200"
      style="fill:none;stroke:#3cb5d6;stroke-width:4;" />

  <!-- Description line 2 (aligned with title) -->
  <path
      d="M 80 130 H 170"
      style="fill:none;stroke:#3cb5d6;stroke-width:4;" />
</svg>
