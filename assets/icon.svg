  <!-- Title line -->
  <path
      d="M 26 22 H 50"
      style="fill:none;stroke:#3cb5d6;stroke-width:2.5;" />

  <!-- Description line 1 -->
  <path
      d="M 26 34 H 48"
      style="fill:none;stroke:#3cb5d6;stroke-width:2.5;" />

  <!-- Description line 2 -->
  <path
      d="M 26 42 H 44"
